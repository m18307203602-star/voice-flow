name: Build macOS App

on:
  push:
    tags: ['v*']
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-mac.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm build_tools/voiceflow_mac.spec

      - name: Package DMG
        run: |
          # 创建临时目录，放 .app + Applications 快捷方式（DMG 拖放安装的标配）
          mkdir -p dist/dmg
          cp -R dist/VoiceFlow.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          # 打包 DMG
          hdiutil create -volname "VoiceFlow" -srcfolder dist/dmg -ov -format UDZO dist/VoiceFlow-3.0.0.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceFlow-macOS-DMG
          path: dist/VoiceFlow-3.0.0.dmg
          retention-days: 30
